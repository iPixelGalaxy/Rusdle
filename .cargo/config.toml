# Local Windows workaround: if building on the V: virtual drive you may hit
# "os error 87" (Cargo's atomic temp-rename fails on that filesystem).
# Fix it by setting CARGO_TARGET_DIR in your shell/environment, e.g.:
#   $env:CARGO_TARGET_DIR = "C:\tmp\rusdle-target"   (PowerShell)
#   export CARGO_TARGET_DIR=C:/tmp/rusdle-target      (bash)
# Do NOT set target-dir here — it would break CI on macOS/Linux.
