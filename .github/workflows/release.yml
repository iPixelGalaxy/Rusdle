name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Build Windows ────────────────────────────────────────────────────────────
  build-windows:
    name: Build · Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: windows-cargo-

      - name: Build
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Package
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target\x86_64-pc-windows-msvc\release\rusdle.exe" "dist\rusdle.exe"
          Compress-Archive -Path "dist\rusdle.exe" -DestinationPath "rusdle-windows-x64.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: rusdle-windows-x64
          path: rusdle-windows-x64.zip

  # ── Build macOS universal ────────────────────────────────────────────────────
  build-macos:
    name: Build · macOS universal
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable) + both Apple targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: macos-cargo-

      - name: Build arm64
        run: cargo build --release --target aarch64-apple-darwin

      - name: Build x86_64
        run: cargo build --release --target x86_64-apple-darwin

      - name: Create universal binary with lipo
        run: |
          lipo -create \
            target/aarch64-apple-darwin/release/rusdle \
            target/x86_64-apple-darwin/release/rusdle \
            -output rusdle-universal

      - name: Assemble Rusdle.app bundle
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          APP="Rusdle.app"
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources"

          cp rusdle-universal "$APP/Contents/MacOS/rusdle"
          chmod +x "$APP/Contents/MacOS/rusdle"
          cp assets/AppIcon.icns "$APP/Contents/Resources/AppIcon.icns"

          # Strip leading 'v' from tag for CFBundleShortVersionString
          BUNDLE_VER="${VERSION#v}"

          cat > "$APP/Contents/Info.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleDisplayName</key>   <string>Rusdle</string>
            <key>CFBundleExecutable</key>    <string>rusdle</string>
            <key>CFBundleIconFile</key>      <string>AppIcon</string>
            <key>CFBundleIdentifier</key>    <string>com.rusdle.game</string>
            <key>CFBundleName</key>          <string>Rusdle</string>
            <key>CFBundlePackageType</key>   <string>APPL</string>
            <key>CFBundleShortVersionString</key> <string>${BUNDLE_VER}</string>
            <key>CFBundleVersion</key>       <string>${BUNDLE_VER}</string>
            <key>LSMinimumSystemVersion</key><string>10.14</string>
            <key>NSHighResolutionCapable</key><true/>
            <key>NSHumanReadableCopyright</key>
              <string>MIT License</string>
          </dict>
          </plist>
          EOF

      - name: Create DMG
        run: |
          # Stage: app bundle + shortcut to /Applications
          mkdir dmg-staging
          cp -r Rusdle.app dmg-staging/
          ln -s /Applications dmg-staging/Applications

          hdiutil create \
            -volname "Rusdle" \
            -srcfolder dmg-staging \
            -ov \
            -format UDZO \
            rusdle-macos-universal.dmg

      - uses: actions/upload-artifact@v4
        with:
          name: rusdle-macos-universal
          path: rusdle-macos-universal.dmg

  # ── Build Linux ──────────────────────────────────────────────────────────────
  build-linux:
    name: Build · Linux x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libssl-dev libgtk-3-dev libfontconfig1-dev

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: linux-cargo-

      - name: Build
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Package
        run: |
          cp target/x86_64-unknown-linux-gnu/release/rusdle ./rusdle
          tar czf rusdle-linux-x64.tar.gz rusdle

      - uses: actions/upload-artifact@v4
        with:
          name: rusdle-linux-x64
          path: rusdle-linux-x64.tar.gz

  # ── Create GitHub Release ────────────────────────────────────────────────────
  release:
    name: Publish release
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Rusdle ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            rusdle-windows-x64.zip
            rusdle-macos-universal.dmg
            rusdle-linux-x64.tar.gz
